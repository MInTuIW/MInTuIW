name: Generate Snake

on:
  push:
    branches: [main]
  schedule:
    # 每天 UTC 0:00（北京时间 8:00）运行
    - cron: "0 0 * * *"
  workflow_dispatch:  # 支持手动触发

# 赋予写权限，以便推送 output 分支
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: MInTuIW
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=89CFF0&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/snake-light.svg?palette=github-light&color_snake=89CFF0&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
          force_orphan: true
