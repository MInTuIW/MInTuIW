name: Generate Snake

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: MInTuIW
          outputs: |
            assets/snake-dark.svg?palette=github-dark&color_snake=%2389CFF0&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2339d353
            assets/snake-light.svg?palette=github-light&color_snake=%2389CFF0&color_dots=%23ebedf0,%239be9a8,%2340c463,%2330a14e,%23216e39

      - name: Post-process SVGs (fix gradient + remove progress bar)
        run: |
          for f in assets/snake-*.svg; do
            python3 -c "
import re

with open('$f', 'r') as fh:
    svg = fh.read()

# 1. Fix: add # to --cs if missing (fallback)
svg = svg.replace('--cs:89CFF0', '--cs:#89CFF0')

# 2. Replace solid --cs fill with gradient reference
#    The .s class controls snake segment fills
svg = svg.replace(
    '.s{shape-rendering:geometricPrecision;fill:var(--cs)',
    '.s{shape-rendering:geometricPrecision;fill:url(#snakeGrad)'
)

# 3. Add gradient definition after <style> block
gradient = '''<defs>
<linearGradient id=\"snakeGrad\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"0%\">
  <stop offset=\"0%\" stop-color=\"#89CFF0\"/>
  <stop offset=\"100%\" stop-color=\"#BB8FCE\"/>
</linearGradient>
</defs>'''
svg = svg.replace('</style>', '</style>' + gradient)

# 4. Remove progress bar (u0, u1, u2, u3 rects)
svg = re.sub(r'<rect class="u[^"]*"[^>]*/>', '', svg)

with open('$f', 'w') as fh:
    fh.write(svg)

print(f'Processed: $f')
"
          done

      - name: Commit SVGs to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --staged --quiet || git commit -m "chore: update snake SVGs [skip ci]"
          git push
