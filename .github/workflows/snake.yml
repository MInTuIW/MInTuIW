name: Generate Snake
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: MInTuIW
          outputs: |
            assets/snake-dark.svg?palette=github-dark
            assets/snake-light.svg?palette=github-light
      - name: Post-process (mint gradient + no progress bar)
        run: python3 .github/scripts/postprocess_snake.py
      - name: Commit SVGs to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --staged --quiet || git commit -m "chore: update snake SVGs"
          git push
