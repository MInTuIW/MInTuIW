name: Generate Snake

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: MInTuIW
          outputs: |
            assets/snake-dark.svg?palette=github-dark&color_snake=89CFF0&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            assets/snake-light.svg?palette=github-light&color_snake=89CFF0&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39

      - name: Commit SVGs to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --staged --quiet || git commit -m "chore: update snake SVGs [skip ci]"
          git push
