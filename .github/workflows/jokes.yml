name: Update Daily Joke

on:
  schedule:
    - cron: "5 0 * * *"    # 每天 UTC 0:05（北京时间 8:05）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-joke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pick random joke & generate SVG
        run: |
          python3 -c "
import json, random

with open('.github/jokes.json', 'r') as f:
    jokes = json.load(f)

joke = random.choice(jokes)

# SVG template with fade-in animation
svg = '''<svg width=\"650\" height=\"28\" xmlns=\"http://www.w3.org/2000/svg\">
<style>
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .j { animation: fadeIn 1.5s ease-out; }
</style>
<text x=\"0\" y=\"18\" fill=\"#6B9DB5\" font-family=\"monospace\" font-size=\"13\" class=\"j\">''' + joke + '''</text>
</svg>'''

with open('assets/joke.svg', 'w') as f:
    f.write(svg)

print(f'Generated joke.svg with: {joke}')
"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/joke.svg
          git diff --staged --quiet || git commit -m "chore: update daily joke [skip ci]"
          git push
