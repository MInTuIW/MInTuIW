name: Update Daily Joke
on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-joke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate joke SVG
        run: python3 .github/scripts/update_joke.py
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/joke.svg
          git diff --staged --quiet || git commit -m "chore: update daily joke"
          git push
